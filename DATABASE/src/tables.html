<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vanilla JS Sortable Table</title>
  <style>
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    th { background: #f4f4f4; cursor: pointer; user-select: none; }
    th:hover { background: #e0e0e0; }
    th.sorted-asc::after  { content: " ↑"; }
    th.sorted-desc::after { content: " ↓"; }
  </style>
</head>
<body>

  <table id="myTable">
    <thead>
      <tr>
        <th data-sort="name">Name</th>
        <th data-sort="age">Age</th>
        <th data-sort="city">City</th>
        <th data-sort="score">Score</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be populated by JS -->
    </tbody>
  </table>

  <script>
    // Sample data
    let data = [
      { name: "Alice",   age: 28, city: "Christchurch", score: 95 },
      { name: "Bob",     age: 34, city: "Wellington",   score: 82 },
      { name: "Charlie", age: 22, city: "Auckland",     score: 91 },
      { name: "Diana",   age: 45, city: "Christchurch", score: 78 },
      { name: "Eve",     age: 29, city: "Dunedin",      score: 88 }
    ];

    const tableBody = document.querySelector("#myTable tbody");
    let currentSort = { column: null, direction: 1 }; // 1 = asc, -1 = desc

    function renderTable(filteredData) {
      tableBody.innerHTML = "";

      filteredData.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.name}</td>
          <td>${row.age}</td>
          <td>${row.city}</td>
          <td>${row.score}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function sortData(column) {
      if (currentSort.column === column) {
        currentSort.direction *= -1; // toggle direction
      } else {
        currentSort.column = column;
        currentSort.direction = 1;
      }

      // Update visual indicators
      document.querySelectorAll("th").forEach(th => {
        th.classList.remove("sorted-asc", "sorted-desc");
        if (th.getAttribute("data-sort") === column) {
          th.classList.add(currentSort.direction === 1 ? "sorted-asc" : "sorted-desc");
        }
      });

      data.sort((a, b) => {
        let valA = a[column];
        let valB = b[column];

        // Handle numbers vs strings
        if (typeof valA === "number" && typeof valB === "number") {
          return (valA - valB) * currentSort.direction;
        }

        // String comparison
        return String(valA).localeCompare(String(valB)) * currentSort.direction;
      });

      renderTable(data);
    }

    // Add click listeners to headers
    document.querySelectorAll("th").forEach(header => {
      header.addEventListener("click", () => {
        const column = header.getAttribute("data-sort");
        sortData(column);
      });
    });

    // Initial render
    renderTable(data);
  </script>
</body>
</html>
