<!DOCTYPE html>
<!-- Sign in page -->
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title id="title"></title>
	<link rel=stylesheet href="src/styles.css">
	<script defer src="src/public/index.js"></script>
	<script defer src="src/public/login.js"></script>
</head>
<body class="login-page">
	<!-- Login form -->
	<header>
		<nav>
			<h2><span class="logo"></span>/Login</h2>
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="feed.html">Feed</a></li>
			</ul>
		</nav>
		<section>
			<form id="login-form" class="form-sign-in">
				<center>
					<h2 id="login-form-header"></h2>
				</center>

				<!-- *Name options -->
				<label>
					Username: <input type="text" placeholder="Username" name="username" autocomplete="username">
				</label>
				
				<label class="sign-up">
					Display Name: <input type="text" placeholder="Display Name" name="display">
				</label>

				<!-- Password options -->
				<label>
					Password: <input type="password" placeholder="Password" name="password" autocomplete="password">
				</label>
				
				<label class="sign-up">
					Confirm Password: <input type="password" placeholder="Confirm Password" name="passwordconfirm">
				</label>

				<!-- Action buttons -->
				<button id="login-form-submit">
					<b>Submit</b>
				</button>
				<b>
					<button id="login-form-switch"></button>
				</b>
				<i id="login-form-errors"></i>
			</form>
		</section>
	</header>
</body>
</html>
