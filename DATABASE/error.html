<!DOCTYPE html>
<!-- Home page -->
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title id="title">Status:</title>
	<link rel=stylesheet href="src/styles.css">
	<script src="src/public/index.js"></script>
</head>
<body class="home-page">
	<header>
		<nav>
			<h1><span class="logo"></span>/Feed</h1>
			<span>
				<a href="index.html">Home</a>
				<span class="auth">
					<a href="dashboard.html">Dashboard</a>
					<a href="user.html">Profile</a>
				</span>
				<a href="feed.html">Feed</a>
				<span class="auth">
					<button onclick="sign_out();open_home()">Sign out</button>
					<a href="create.html">
						<button id="create" >Create</button>
					</a>
				</span>
				<span class="non-auth">
					<a href="sign_in.html">Sign In</a>
					<a href="sign_in.html?sign=up">Sign Up</a>
				</span>
			</span>
		</nav>
		<code>
			<h1 id="code"></h1>
		</code>
		<h4 id="reason"></h4>
	</header>
	<script>
		const _reason = document.getElementById("reason");
		const _code = document.getElementById("code");
		const params = new URLSearchParams(String(location.href).split("?")[1]);
		for (let pair of params.entries()){
			console.log(pair);
			if (pair[0] == "q")
				_reason.innerText = pair[1];
			if (pair[0] == "c")
				_code.innerText = pair[1];
		}
	</script>
</body>
</html>
